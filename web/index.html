<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>wa-bridge</title>
<style>
  :root {
    --bg: #0e1014;
    --panel: #161a22;
    --panel-2: #1c2230;
    --border: #232a3a;
    --text: #e6e8eb;
    --muted: #8a93a4;
    --accent: #25d366;
    --in-bubble: #1f2535;
    --out-bubble: #14573b;
    --danger: #ff5d6c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; }
  button { cursor: pointer; }
  input, textarea, button, select { font: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2a3142; border-radius: 4px; }

  /* Login */
  #login { display: none; height: 100%; align-items: center; justify-content: center; }
  #login.visible { display: flex; }
  #login .card { background: var(--panel); padding: 32px; border-radius: 12px; border: 1px solid var(--border); width: 380px; }
  #login h1 { margin: 0 0 8px; font-size: 18px; }
  #login p { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
  #login input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: ui-monospace, monospace; font-size: 12px; }
  #login button { margin-top: 12px; width: 100%; padding: 10px; background: var(--accent); color: #0e1014;
    border: none; border-radius: 6px; font-weight: 600; }
  #login .err { margin-top: 10px; color: var(--danger); font-size: 12px; min-height: 16px; }

  /* App */
  #app { display: none; height: 100%; flex-direction: column; }
  #app.visible { display: flex; }
  header { display: flex; align-items: center; padding: 10px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border); gap: 12px; }
  header .brand { font-weight: 600; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  header .dot.ok { background: var(--accent); }
  header select { background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 4px 8px; }
  header .spacer { flex: 1; }
  header button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 6px; }

  main { flex: 1; display: flex; min-height: 0; }
  aside { width: 340px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; }
  aside .search { padding: 10px; border-bottom: 1px solid var(--border); }
  aside input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); }
  aside .list { flex: 1; overflow-y: auto; }
  .convo { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer;
    border-bottom: 1px solid #1a1f2a; }
  .convo:hover { background: var(--panel-2); }
  .convo.active { background: #20283a; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2a3142; color: var(--text);
    display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; font-size: 14px; }
  .avatar.group { background: #2a3142; color: var(--accent); }
  .convo .meta { flex: 1; min-width: 0; }
  .convo .name { font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; display: flex; gap: 6px; align-items: center; }
  .convo .name .group-tag { font-size: 10px; color: var(--accent); background: #122c1f; padding: 1px 5px;
    border-radius: 3px; flex-shrink: 0; }
  .convo .last { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; margin-top: 2px; }
  .convo .ts { color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .convo .badge { background: var(--accent); color: #0e1014; border-radius: 10px; padding: 1px 7px;
    font-size: 11px; font-weight: 700; margin-left: auto; }

  section.chat { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
    display: flex; align-items: center; gap: 12px; }
  .chat-header .name { font-weight: 600; }
  .chat-header .sub { color: var(--muted); font-size: 12px; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
  .messages .empty { margin: auto; color: var(--muted); }
  .bubble { max-width: 70%; padding: 8px 12px; border-radius: 12px; word-wrap: break-word;
    white-space: pre-wrap; }
  .bubble .meta { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
  .bubble.in { background: var(--in-bubble); align-self: flex-start; border-bottom-left-radius: 4px; }
  .bubble.out { background: var(--out-bubble); align-self: flex-end; border-bottom-right-radius: 4px; }
  .bubble.in .sender { font-size: 11px; color: var(--accent); margin-bottom: 2px; }
  .day-divider { align-self: center; background: #1a1f2a; color: var(--muted); padding: 2px 10px;
    border-radius: 10px; font-size: 11px; margin: 8px 0; }
  .non-text { color: var(--muted); font-style: italic; }

  .compose { padding: 10px 12px; background: var(--panel); border-top: 1px solid var(--border);
    display: flex; gap: 8px; }
  .compose textarea { flex: 1; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 18px; color: var(--text); resize: none; max-height: 120px; min-height: 40px; line-height: 1.4; }
  .compose button { background: var(--accent); color: #0e1014; border: none; border-radius: 50%;
    width: 40px; height: 40px; font-weight: 700; flex-shrink: 0; }
  .compose button:disabled { background: #2a3142; color: var(--muted); cursor: not-allowed; }
  .placeholder { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--muted); }
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h1>wa-bridge</h1>
    <p>Paste your API token (in <code>.env</code> as <code>API_TOKEN</code>).</p>
    <input id="token-input" type="password" placeholder="API token..." autocomplete="off" />
    <button id="login-btn">Connect</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="brand">wa-bridge</div>
    <span class="dot" id="conn-dot"></span>
    <select id="session-select"></select>
    <div class="spacer"></div>
    <button id="logout-btn">Logout</button>
  </header>
  <main>
    <aside>
      <div class="search">
        <input id="search-input" placeholder="Search conversations..." />
      </div>
      <div class="list" id="convo-list"></div>
    </aside>
    <section class="chat">
      <div id="chat-pane" class="placeholder">Select a conversation</div>
    </section>
  </main>
</div>

<script>
const TOKEN_KEY = 'wa-bridge-token';
const $ = (id) => document.getElementById(id);

const state = {
  token: null,
  sessions: [],
  session: null,
  conversations: [],
  currentJid: null,
  messages: [],
  search: '',
};

// ---------- API ----------
async function api(path, init = {}) {
  const res = await fetch(path, {
    ...init,
    headers: {
      'Authorization': `Bearer ${state.token}`,
      'Content-Type': 'application/json',
      ...(init.headers || {}),
    },
  });
  if (res.status === 401) throw new Error('unauthorized');
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  return res.json();
}

async function getHealth() { return api('/v1/health'); }
async function getConversations(session) {
  return api(`/v1/conversations?session=${encodeURIComponent(session)}&limit=200`);
}
async function getMessages(session, jid) {
  return api(`/v1/messages?session=${encodeURIComponent(session)}&jid=${encodeURIComponent(jid)}&limit=100`);
}
async function sendMessage(session, to, text) {
  return api('/v1/send', { method: 'POST', body: JSON.stringify({ session, to, text }) });
}

// ---------- Auth ----------
async function tryToken(token) {
  state.token = token;
  const r = await fetch('/v1/health', { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) throw new Error('invalid token');
}

function showLogin(err) {
  $('login').classList.add('visible');
  $('app').classList.remove('visible');
  $('login-err').textContent = err || '';
  setTimeout(() => $('token-input').focus(), 50);
}

function showApp() {
  $('login').classList.remove('visible');
  $('app').classList.add('visible');
}

$('login-btn').onclick = async () => {
  const t = $('token-input').value.trim();
  if (!t) return;
  try {
    await tryToken(t);
    localStorage.setItem(TOKEN_KEY, t);
    await boot();
  } catch (e) {
    showLogin('Invalid token');
  }
};

$('token-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('login-btn').click();
});

$('logout-btn').onclick = () => {
  localStorage.removeItem(TOKEN_KEY);
  state.token = null;
  showLogin();
};

// ---------- Render ----------
function initials(name) {
  if (!name) return '?';
  return name.split(/\s+/).slice(0, 2).map(p => p[0] || '').join('').toUpperCase() || '?';
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const same = d.toDateString() === now.toDateString();
  if (same) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const diff = (now - d) / (1000 * 60 * 60 * 24);
  if (diff < 7) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function fmtDay(ts) {
  const d = new Date(ts);
  const now = new Date();
  const same = d.toDateString() === now.toDateString();
  if (same) return 'Today';
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
}

function renderSessions() {
  const sel = $('session-select');
  sel.innerHTML = '';
  for (const s of state.sessions) {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    if (s === state.session) opt.selected = true;
    sel.appendChild(opt);
  }
}

function renderConversations() {
  const root = $('convo-list');
  root.innerHTML = '';
  const q = state.search.toLowerCase();
  for (const c of state.conversations) {
    const name = c.display_name || c.phone || c.chat_jid;
    if (q && !(name.toLowerCase().includes(q) || (c.last_body || '').toLowerCase().includes(q))) continue;
    const el = document.createElement('div');
    el.className = 'convo' + (c.chat_jid === state.currentJid ? ' active' : '');
    const lastBody = c.last_body || (c.last_type ? `[${c.last_type}]` : '');
    el.innerHTML = `
      <div class="avatar ${c.is_group ? 'group' : ''}">${c.is_group ? '#' : escapeHtml(initials(name))}</div>
      <div class="meta">
        <div class="name">${escapeHtml(name)}${c.is_group ? '<span class="group-tag">GROUP</span>' : ''}</div>
        <div class="last">${escapeHtml(lastBody)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="ts">${fmtTime(c.last_ts)}</div>
        ${c.unread_count > 0 ? `<div class="badge">${c.unread_count}</div>` : ''}
      </div>
    `;
    el.onclick = () => openConvo(c);
    root.appendChild(el);
  }
}

function renderChatPane() {
  const pane = $('chat-pane');
  if (!state.currentJid) {
    pane.className = 'placeholder';
    pane.innerHTML = 'Select a conversation';
    return;
  }
  const convo = state.conversations.find(c => c.chat_jid === state.currentJid);
  const name = convo?.display_name || convo?.phone || state.currentJid;
  const sub = convo?.is_group ? 'Group' : (convo?.phone || '');
  pane.className = '';
  pane.innerHTML = `
    <div class="chat-header">
      <div class="avatar ${convo?.is_group ? 'group' : ''}">${convo?.is_group ? '#' : escapeHtml(initials(name))}</div>
      <div>
        <div class="name">${escapeHtml(name)}</div>
        <div class="sub">${escapeHtml(sub)}</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="compose">
      <textarea id="compose-input" placeholder="Type a message..." rows="1"></textarea>
      <button id="send-btn" title="Send">→</button>
    </div>
  `;

  renderMessages();

  const input = $('compose-input');
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  $('send-btn').onclick = doSend;
}

function renderMessages() {
  const root = $('messages');
  if (!root) return;
  if (!state.messages.length) {
    root.innerHTML = '<div class="empty">No messages</div>';
    return;
  }
  root.innerHTML = '';
  const ordered = [...state.messages].sort((a, b) => a.ts - b.ts);
  let lastDay = '';
  for (const m of ordered) {
    const dayKey = new Date(m.ts).toDateString();
    if (dayKey !== lastDay) {
      const div = document.createElement('div');
      div.className = 'day-divider';
      div.textContent = fmtDay(m.ts);
      root.appendChild(div);
      lastDay = dayKey;
    }
    const b = document.createElement('div');
    b.className = 'bubble ' + (m.direction === 'in' ? 'in' : 'out');
    const senderLine = (m.direction === 'in' && m.from_display_name)
      ? `<div class="sender">${escapeHtml(m.from_display_name)}</div>` : '';
    const body = m.body
      ? escapeHtml(m.body).replace(/\n/g, '<br>')
      : `<span class="non-text">[${escapeHtml(m.type)}]</span>`;
    b.innerHTML = `${senderLine}${body}<div class="meta">${fmtTime(m.ts)}</div>`;
    root.appendChild(b);
  }
  root.scrollTop = root.scrollHeight;
}

async function doSend() {
  const input = $('compose-input');
  const text = input.value.trim();
  if (!text || !state.currentJid) return;
  $('send-btn').disabled = true;
  try {
    await sendMessage(state.session, state.currentJid, text);
    input.value = '';
    input.style.height = 'auto';
    await refreshOpenChat();
  } catch (e) {
    alert('Send failed: ' + e.message);
  } finally {
    $('send-btn').disabled = false;
    input.focus();
  }
}

async function openConvo(c) {
  state.currentJid = c.chat_jid;
  renderConversations();
  renderChatPane();
  await refreshOpenChat();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

// ---------- Polling ----------
async function refreshConversations() {
  try {
    const data = await getConversations(state.session);
    state.conversations = data.conversations;
    renderConversations();
    if (state.currentJid && !state.conversations.find(c => c.chat_jid === state.currentJid)) {
      // current chat scrolled off; that's fine, leave open
    }
  } catch (e) {
    if (e.message === 'unauthorized') showLogin('Session expired');
  }
}

async function refreshOpenChat() {
  if (!state.currentJid) return;
  try {
    const data = await getMessages(state.session, state.currentJid);
    state.messages = data.messages;
    renderMessages();
  } catch (e) {
    if (e.message === 'unauthorized') showLogin('Session expired');
  }
}

let convoTimer, msgTimer;
function startPolling() {
  clearInterval(convoTimer);
  clearInterval(msgTimer);
  convoTimer = setInterval(refreshConversations, 8_000);
  msgTimer = setInterval(refreshOpenChat, 3_000);
}

// ---------- Events ----------
$('session-select').addEventListener('change', async (e) => {
  state.session = e.target.value;
  state.currentJid = null;
  state.messages = [];
  renderChatPane();
  await refreshConversations();
});

$('search-input').addEventListener('input', (e) => {
  state.search = e.target.value;
  renderConversations();
});

// ---------- Boot ----------
async function boot() {
  try {
    const h = await getHealth();
    state.sessions = h.sessions || [];
    if (!state.sessions.length) {
      showLogin('No sessions paired yet. Run `npm run start -- <name> <number>` first.');
      return;
    }
    state.session = state.sessions[0];
    $('conn-dot').classList.add('ok');
    showApp();
    renderSessions();
    await refreshConversations();
    startPolling();
  } catch (e) {
    showLogin(e.message);
  }
}

// init
const stored = localStorage.getItem(TOKEN_KEY);
if (stored) {
  state.token = stored;
  boot();
} else {
  showLogin();
}
</script>
</body>
</html>
